<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Shopping Cart</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="products">
            <h2>Products</h2>
            <div class="product">
                <h3>Product 1</h3>
                <p>Price: $199.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <h3>Product 2</h3>
                <p>Price: $299.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <h3>Product 3</h3>
                <p>Price: $399.99</p>
                <button>Add to Cart</button>
            </div>
        </section>
        <section id="cart">
            <h2>Your Cart</h2>
            <ul>
                <li>Product 1 - $199.99</li>
                <li>Product 2 - $299.99</li>
                <li>Product 3 - $399.99</li>
            </ul>
            <p>Total: $899.97</p>
            <button>Checkout</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Electronics E-commerce</p>
    </footer>
</body>
</html>
